name: Build & Release Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Repo'yu checkout et
      - uses: actions/checkout@v4

      # 2️⃣ Java 17 kur
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Gradle kur
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4️⃣ Android SDK kur
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      # 5️⃣ Release APK build
      - name: Build Release APK
        run: gradle clean assembleRelease

      # 6️⃣ APK’yı Yandoor.apk olarak rename et
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Yandoor.apk

      # 7️⃣ GitHub Release’e yükle
      - name: Upload Release APK
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}  # repo secrets’ta oluştur
          name: "Yandoor APK"
          tag: ${{ github.ref_name }}
          artifacts: app/build/outputs/apk/release/Yandoor.apk
          draft: false
          prerelease: false
