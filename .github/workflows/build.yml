name: Build & Release Signed Android APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Repo'yu checkout et
      - uses: actions/checkout@v4

      # 2️⃣ Java 17 kur
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Gradle kur
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4️⃣ Android SDK kur
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      # 5️⃣ Keystore oluştur (keytool)
      - name: Generate Keystore
        run: |
          keytool -genkey -v \
          -keystore yandoor.jks \
          -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
          -alias yandoor_key \
          -keypass ${{ secrets.KEY_PASSWORD }} \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Yandoor, OU=App, O=Yandoor, L=City, S=State, C=TR"

      # 6️⃣ Gradle build (signed)
      - name: Build Signed Release APK
        run: |
          ./gradlew clean assembleRelease \
          -Pandroid.injected.signing.store.file=$PWD/yandoor.jks \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=yandoor_key \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 7️⃣ Release klasörünü kontrol et
      - name: List release folder
        run: ls -l app/build/outputs/apk/release/

      # 8️⃣ APK’yı Yandoor.apk olarak rename et
      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Yandoor.apk

      # 9️⃣ GitHub Release’e yükle
      - name: Upload Release APK
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          name: "Yandoor APK"
          tag: ${{ github.ref_name }}
          artifacts: app/build/outputs/apk/release/Yandoor.apk
          draft: false
          prerelease: false
